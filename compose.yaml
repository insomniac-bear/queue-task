version: '3.8'

services:
  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    ports:
      - "${API_PORT}:3000"
    environment:
      - PORT=3000
    networks:
      - app-network

  react-app:
    build:
      context: ./react-client
      dockerfile: Dockerfile
      args:
        VITE_API_HOST: ${API_HOST}
        VITE_API_PORT: ${API_PORT}
        VITE_WS_HOST: ${WS_HOST}
        VITE_WS_PORT: ${WS_PORT}
    ports:
      - "${REACT_APP_PORT:-8080}:80"
    depends_on:
      - mock-server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge